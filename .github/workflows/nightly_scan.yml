name: Nightly CSS Scan

on:
  schedule:
    - cron: '0 2 * * 1-5'   # 9 PM ET = 2 AM UTC, weekdays only
  workflow_dispatch:          # lets you trigger it manually from GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PORTFOLIO_VALUE: ${{ secrets.PORTFOLIO_VALUE }}
        run: python main.py